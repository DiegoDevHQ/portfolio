<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@0.12.0/dist/js-confetti.browser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        ul {
            list-style: none;
        }
        
        li {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .delete-btn {
            background: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #c0392b;
        }
        
        .complete-btn {
            background: #27ae60;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .complete-btn:hover {
            background: #229954;
        }
        
        .button-group {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <audio id="hooraySound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>
    
    <div class="container">
        <h1>📝 Task Tracker</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>
        
        <ul id="taskList"></ul>
    </div>
    
    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskList = document.getElementById('taskList');
            
            if (input.value.trim() === '') {
                alert('Please enter a task!');
                return;
            }
            
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${input.value}</span>
                <div class="button-group">
                    <button class="complete-btn" onclick="completeTask(this)">Complete</button>
                    <button class="delete-btn" onclick="this.parentElement.parentElement.remove()">Delete</button>
                </div>
            `;
            
            taskList.appendChild(li);
            input.value = '';
            input.focus();
        }
        
        const confetti = new JSConfetti();
        
        function completeTask(btn) {
            const taskSpan = btn.parentElement.parentElement.querySelector('span');
            const isCompleted = taskSpan.style.textDecoration !== 'line-through';
            
            taskSpan.style.textDecoration = isCompleted ? 'line-through' : 'none';
            taskSpan.style.color = isCompleted ? '#9b9b9b' : '';
            
            if (isCompleted) {
                confetti.addConfetti();
                const sound = document.getElementById('hooraySound');
                sound.currentTime = 0;
                sound.play().catch(err => console.log('Sound play failed:', err));
            }
        }
        
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
