<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Churn Predictor</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
        .predictor-container {
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            background: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.25);
        }
        
        button {
            background: #007bff;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }
        
        .result.churn {
            border-left-color: #dc3545;
        }
        
        .result.no-churn {
            border-left-color: #28a745;
        }
        
        .probability-bar {
            height: 24px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        
        .probability-fill {
            height: 100%;
            background: #dc3545;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            transition: width 0.3s;
        }
        
        .probability-fill.no-churn {
            background: #28a745;
        }
        
        .error {
            color: #dc3545;
            padding: 1rem;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            margin-top: 1rem;
        }

        .notice {
            color: #664d03;
            padding: 1rem;
            background: #fff3cd;
            border: 1px solid #ffecb5;
            border-radius: 4px;
            margin-top: 1rem;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #007bff;
            margin-top: 1rem;
        }
        
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <header class="site-header" role="banner">
        <div class="container">
            <h1>Customer Churn Predictor</h1>
            <p>Predict customer churn probability based on their data</p>
        </div>
    </header>

    <main id="main" class="site-main" role="main">
        <div class="predictor-container">
            <form id="predictionForm">
                <div id="formFields"></div>
                <button type="submit">Predict Churn</button>
                <div class="loading" id="loading">Loading prediction...</div>
            </form>

            <div id="result"></div>
            <div id="error"></div>
        </div>
    </main>

    <script>
        const API_FALLBACK_BASES = [
            'http://127.0.0.1:5000/api',
            'http://localhost:5000/api',
            'http://127.0.0.1:3000/api',
            'http://localhost:3000/api'
        ];

        const FALLBACK_SCHEMA = {
            features: [
                "Age",
                "Tenure_Months",
                "Monthly_Charges",
                "Total_Charges",
                "Contract_Type",
                "Internet_Service",
                "Online_Security",
                "Online_Backup",
                "Device_Protection",
                "Tech_Support",
                "Streaming_TV",
                "Streaming_Movies",
                "Paperless_Billing",
                "Payment_Method"
            ],
            categorical_options: {
                "Contract_Type": ["Month-to-month", "One year", "Two year"],
                "Internet_Service": ["DSL", "Fiber optic", "No"],
                "Online_Security": ["No", "No internet", "Yes"],
                "Online_Backup": ["No", "No internet", "Yes"],
                "Device_Protection": ["No", "No internet", "Yes"],
                "Tech_Support": ["No", "No internet", "Yes"],
                "Streaming_TV": ["No", "No internet", "Yes"],
                "Streaming_Movies": ["No", "No internet", "Yes"],
                "Paperless_Billing": ["No", "Yes"],
                "Payment_Method": ["Bank transfer", "Credit card", "Electronic check", "Mailed check"]
            }
        };

        function getApiBaseCandidates() {
            const candidates = [];

            const protocol = window.location.protocol;
            const host = window.location.hostname;
            const isLocalHost = host === 'localhost' || host === '127.0.0.1';

            if (protocol === 'http:' || protocol === 'https:') {
                candidates.push(`${window.location.origin}/api`);
            }

            // For public HTTPS sites, avoid localhost fallbacks that cannot be reached by visitors.
            if (protocol === 'https:' && !isLocalHost) {
                return candidates;
            }

            API_FALLBACK_BASES.forEach(base => {
                if (!candidates.includes(base)) {
                    candidates.push(base);
                }
            });

            return candidates;
        }

        function fetchWithTimeout(url, options = {}, timeoutMs = 5000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);

            return fetch(url, { ...options, signal: controller.signal })
                .finally(() => clearTimeout(timer));
        }

        async function requestApi(path, options = {}, retries = 1) {
            const bases = getApiBaseCandidates();
            const isPublicHttps = window.location.protocol === 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';
            const endpointPaths = path.endsWith('.py')
                ? [path]
                : (isPublicHttps ? [path] : [path, `${path}.py`]);
            let lastError = new Error('No API base candidates available.');

            for (const base of bases) {
                for (const endpointPath of endpointPaths) {
                    const url = `${base}${endpointPath}`;
                    for (let attempt = 0; attempt <= retries; attempt += 1) {
                        try {
                            const response = await fetchWithTimeout(url, options, 6000);
                            if (!response.ok) {
                                let details = '';
                                try {
                                    const bodyText = await response.text();
                                    if (bodyText) {
                                        details = ` - ${bodyText.slice(0, 300)}`;
                                    }
                                } catch (readErr) {
                                    // Ignore response read issues and keep status-only error.
                                }
                                throw new Error(`API responded ${response.status} for ${url}${details}`);
                            }
                            return { response, apiBase: base };
                        } catch (error) {
                            lastError = error;
                        }
                    }
                }
            }

            throw lastError;
        }

        // Fetch features and build form on page load
        async function initializeForm() {
            let data = FALLBACK_SCHEMA;
            try {
                const { response } = await requestApi('/features', {}, 1);
                data = await response.json();
            } catch (error) {
                console.error('Error initializing form, using fallback schema:', error);
                document.getElementById('error').innerHTML = '<div class="notice">Using backup form fields. Predictions are still available.</div>';
            }

            const formFields = document.getElementById('formFields');
            const categoricalOptions = data.categorical_options || {};

            data.features.forEach(feature => {
                const group = document.createElement('div');
                group.className = 'form-group';

                const label = document.createElement('label');
                label.htmlFor = feature;
                label.textContent = feature.replace(/_/g, ' ').toUpperCase();

                group.appendChild(label);

                if (feature in categoricalOptions) {
                    const select = document.createElement('select');
                    select.id = feature;
                    select.name = feature;
                    select.required = true;

                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = `Select ${label.textContent}`;
                    select.appendChild(defaultOption);

                    categoricalOptions[feature].forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option;
                        opt.textContent = option;
                        select.appendChild(opt);
                    });

                    group.appendChild(select);
                } else {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.id = feature;
                    input.name = feature;
                    input.step = 'any';
                    input.required = true;
                    input.placeholder = `Enter ${label.textContent}`;
                    group.appendChild(input);
                }

                formFields.appendChild(group);
            });
        }
        
        // Handle form submission
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            loading.classList.add('active');
            resultDiv.innerHTML = '';
            errorDiv.innerHTML = '';
            
            try {
                // Gather form data
                const formData = new FormData(document.getElementById('predictionForm'));
                const data = Object.fromEntries(formData);
                
                // Convert numeric fields to numbers
                Object.keys(data).forEach(key => {
                    const value = data[key];
                    if (!isNaN(value) && value !== '') {
                        data[key] = parseFloat(value);
                    }
                });
                
                // Send prediction request
                const { response } = await requestApi('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                }, 0);
                
                const result = await response.json();
                
                // Display result
                const resultClass = result.churn ? 'churn' : 'no-churn';
                const churnText = result.churn ? 'WILL CHURN' : 'WILL NOT CHURN';
                const churnProb = (result.churn_probability * 100).toFixed(2);
                
                resultDiv.innerHTML = `
                    <div class="result ${resultClass}">
                        <h3>Prediction: ${churnText}</h3>
                        <p><strong>Churn Probability:</strong> ${churnProb}%</p>
                        <div class="probability-bar">
                            <div class="probability-fill ${resultClass}" style="width: ${result.churn_probability * 100}%">
                                ${churnProb}%
                            </div>
                        </div>
                        <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">
                            No Churn Probability: ${(result.no_churn_probability * 100).toFixed(2)}%
                        </p>
                    </div>
                `;
            } catch (error) {
                errorDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            } finally {
                loading.classList.remove('active');
            }
        });
        
        // Initialize form on page load
        initializeForm();
    </script>
</body>
</html>
